[[function]]
va = 0x004EC540
name = "Frontend__LaunchGameSession"
plate_comment = "Frontend__LaunchGameSession: Called from frontend dialogs to start a game. Hides frontend UI, stops audio, calls GameSession__Run, then restores frontend state. param_1=frontend/GameWorld, param_2=dialog window, param_3/4=display params passed to GameEngine__InitHardware."

[[function]]
va = 0x004ED050
name = "Frontend__PumpModalOrSessionFrame"
plate_comment = "Pumps frame work for the GetMessageProc synthesized-input path.\\n\\nIf a `GameSession` exists with `init_flag != 0`, calls `GameSession::ProcessFrame` (single per-frame tick).\\nOtherwise, if a top-level modal dialog (`g_TopModalDialog`) is active, drains its WM_TIMER (0x113) message queue with `DispatchMessageA`, then invokes the dialog's vtable+0x15C transition method with arg `0`.\\n\\nCalled exactly once, from `Frontend::GetMessageProc` (0x004ED160), after the synthesized mouse_event that initiated this hook callback's drain pass.\\n\\nNow ported in Rust (inlined into the Rust GetMessageProc port). No remaining xrefs."

