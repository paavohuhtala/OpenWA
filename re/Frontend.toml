[[function]]
va = 0x004ED160
name = "Frontend__GetMessageProc"
plate_comment = "Frontend WH_GETMESSAGE hook proc — synthesizes mouse_event() calls so the engine can drain WM_MOUSEWHEEL or WM_MBUTTON* bursts while a modal-dialog input grab (`g_InputHookMode != Off`) is active.\\n\\nProcessing only runs on the (code==0, wparam==PM_REMOVE) entry; the byte at `g_GetMsgProc_Recursing` (0x008ACE32) is the recursion guard.\\n\\nState machine:\\n  - In `InputHookMode::Animated`:\\n     * If a synthesized pump is already pending (`g_input_hook_flag_2dd7 != 0`): clear that flag iff `GetCapture() == NULL` or a popup-menu window (`#32768`) is up, then fall through to the off/blocking-pending branch.\\n     * Else, on WM_NCLBUTTONDOWN (0xA1) or WM_NCRBUTTONDOWN (0xA4): set `g_GetMsgProc_NCRight` to 0/1, mark `g_input_hook_flag_2dd7 = 1`, and synthesize either a wheel event (`MOUSEEVENTF_WHEEL`, filter_select==0) or a middle-button up/down event (filter_select!=0, state seeded from `GetKeyState(VK_MBUTTON)`).\\n  - In `InputHookMode::Blocking` OR with a pending pump: if the message matches the filter (WM_MOUSEWHEEL when filter_select==0; WM_MBUTTONDOWN..WM_MBUTTONDBLCLK when !=0), call `Frontend::PumpModalOrSessionFrame`, toggle `g_GetMsgProc_StateAck` based on whether the button-pressed state changed. Then drain queued same-class messages and synthesize a final mouse_event.\\n\\nAlways chains via `CallNextHookEx(g_FrontendMsgHook, ...)`.\\n\\nNow ported to Rust (`openwa_game::frontend::input_hooks::get_message_proc`). The DLL registers the Rust function directly with `SetWindowsHookExA`; the WA address is install_trapped as a safety net."

