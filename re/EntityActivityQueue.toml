[[function]]
va = 0x00541620
name = "EntityActivityQueue__Init"
calling_convention = "__fastcall"
plate_comment = """
EntityActivityQueue::Init — initialise the most-recent-activity rank table at GameWorld+0x600.

Sets free_pool[0..capacity] to identity (0,1,2,...), ages[0..capacity] to -1 (0xFFFFFFFF), pool_head=capacity, count=0, capacity_field=capacity.

Each WorldEntity subclass (Worm, OldWorm, Crate, Mine, OilDrum, Cross, Canister) acquires a slot in its ctor and frees it in its dtor. The rank ages monotonically across the active set; ResetRank (0x541790) bounces the caller to "newest" (rank 0). Only known reader of ages[]: WormEntity::BehaviorTick water-death path, which forwards ages[slot] as a stagger delay to ScoreBubbleEntity ctor.

Layout (relative to queue base = world+0x600):
  +0x0000  free_pool[capacity]      LIFO of unused slot IDs
  +0x1000  active_ids[capacity]     compact list of currently-held IDs
  +0x2000  ages[capacity]           per-slot rank (0xFFFFFFFF = unused)
  +0x3000  pool_head                free-pool top
  +0x3004  count                    active slot count
  +0x3008  capacity                 configured capacity (<=0x100 in practice)

Was previously misnamed SpriteGfxTable__Init.
"""

  [function.signature]
  returns = "void"

  [[function.param]]
  name = "this"
  type = "EntityActivityQueue *"

  [[function.param]]
  name = "capacity"
  type = "uint"

