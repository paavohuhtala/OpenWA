[[function]]
va = 0x005003D0
name = "WormEntity__StepRopePhysics_Maybe"
plate_comment = "Per-frame rope physics step. Not a \"snapshot\" — runs FUN_004FC280 (constraint solver), walks rope segments via FUN_004FBDC0 / FUN_004FD360 / FUN_004FD4C0 / FUN_004FD640, and (when +0xBC != 0) recomputes worm angle (+0x8C) from the segment list and damps velocity (+0x90/+0x94) by a factor at +0x78. __usercall(this on stack, AL = mode_flag): AL=0 runs full physics + segment loop; AL!=0 zeros worm flags +0x34 and skips the FUN_004FC280 call. Spills scratch globals at DAT_007740F4 etc. — those are not save/restore. Called from many entity per-frame paths; in WormEntity::HandleMessage case 0x3 (RenderScene) it advances the rope by render_interp_a for sub-frame interpolation."

[[function]]
