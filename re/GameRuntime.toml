[[function]]
va = 0x0052AAA0
name = "GameRuntime__UpdateNetworkHudAnimations"
calling_convention = "__stdcall"
custom_storage = true
plate_comment = """
GameRuntime::UpdateNetworkHudAnimations

CALLING CONVENTION: __usercall — `this` is passed in ESI (NOT ECX).
Function reads `[ESI + 0x488]` (runtime.world) in its first instruction.
Five Fixed stack params, callee-cleaned (RET 0x14). The Ghidra prototype
is typed as __stdcall because the prototype tool can't express
custom-register storage; consumers must remember this->ESI.

Despite the previous "AdvanceFrameCounters" name, this function's primary
job is to drive the slide/fade animations of the network-related HUD
elements:
  - chat box slide-in (runtime+0x3FC, chat_box_anim)
  - "unseen messages" indicator (runtime+0x454, message_indicator_anim)
    gated by the hold timer at runtime+0x450 (message_indicator_timer)
    and suppressed by the extended team-bar HUD mode (runtime+0x414,
    hud_team_bar_extended)
  - connection-issue indicator (runtime+0x46C, connection_issue_anim)

The only frame-counter work is a single wrapping_add of advance_ratio
into world.scaled_frame_accum (world+0x77D8) — incidental to the
surrounding animation logic.

PARAMETERS:
  ESI       — this (GameRuntime *)
  [ESP+04]  — chat_box_min_step (Fixed)   per-frame floor for chat-box slew
  [ESP+08]  — chat_box_rate     (Fixed)   chat-box slew rate
  [ESP+0C]  — ui_anim_min_step  (Fixed)   per-frame floor for indicator slews
  [ESP+10]  — ui_anim_rate      (Fixed)   indicator slew rate
  [ESP+14]  — advance_ratio     (Fixed)   sub-frame time advance

Ported to Rust as engine::main_loop::dispatch_frame::update_network_hud_animations.
"""

