[[function]]
va = 0x005344B0
name = "GameRuntime__StepRenderScaleFade"
plate_comment = """
GameRuntime::StepRenderScaleFade — smooths GameWorld::render_scale (offset 0x7394) one frame toward a target selected by the sign of GameRuntime::render_scale_fade_request (offset 0x464):
  < 0  → fade in, target 0x10000 (Fixed::ONE)
  >= 0 → fade out, target 0
Step size 0x0F5C per frame (~0.06 in 16.16), clamped to [0, 0x10000]. When the fade reaches its target, the latch (field 0x464) is cleared to 0. Return value is the post-update latch; 0 means the fade has settled.

Fully ported to Rust as `engine::dispatch_frame::step_render_scale_fade` in openwa-game.
"""

