[[function]]
va = 0x00534E00
name = "GameRuntime__RenderNetworkEndWaitTextbox"
plate_comment = """
GameRuntime::RenderNetworkEndWaitTextbox

Was named "RenderTurnStatus_Maybe" — misleading. This function does NOT
render any kind of turn status; it draws exactly one localized textbox
(GAME_PLAYER_WAIT, token 0x6D0, "PLEASE WAIT %d SEC") during the network
end-of-round handshake.

Fires when:
  - game_state is NETWORK_END_AWAITING_PEERS (2) or NETWORK_END_STARTED (3),
  - world.net_session != null, AND
  - either runtime.net_end_countdown != 0 (still in the timeout window),
    OR the countdown has reached zero AND
    NetSession vtable slot 10 (end_handshake_busy_maybe) reports the
    handshake is no longer busy.

The countdown shown is `net_end_countdown / 50` (frames -> seconds),
formatted via the rotating sprintf scratch buffer.

Companion of GameRuntime__RenderWaitingForPeersTextbox (0x00534F20) — the
*pre*-round wait textbox; this one handles the *post*-round wait.

Ported to Rust as
engine::main_loop::render_frame::render_network_end_wait_textbox.
"""

[[function]]
va = 0x00534F20
name = "GameRuntime__RenderWaitingForPeersTextbox"
plate_comment = """
GameRuntime::RenderWaitingForPeersTextbox

Was named "RenderHUD_Maybe" — grossly misleading. This function does NOT
render the in-game HUD; it draws exactly one localized textbox
(GAME_PLEASE_WAIT, token 0x6B6) centered horizontally at the top of the
viewport.

Only fires during the very specific pre-round window when:
  - game_state == 1 (running),
  - world.net_session != null (network play), AND
  - GameRuntime__AllPeerTeamsHaveJoined (0x0052DB60) returns false —
    i.e. at least one peer's team_starting_marker is still 0.

Once all peers have joined the round, this returns silently and the
textbox disappears.

Ported to Rust as
engine::main_loop::render_frame::render_waiting_for_peers_textbox.
"""

[[function]]
va = 0x00535000
name = "GameRuntime__RenderEscMenuOverlay"
calling_convention = "__cdecl"
custom_storage = true
plate_comment = """
Per-frame ESC-menu overlay renderer. Called from GameRender_Maybe (0x533DC0) as one of the tail render funcs (was misnamed RenderTerrain_Maybe — but actual terrain is rendered via the world entity tree's message-3 handlers, not here).

usercall: EAX = GameRuntime* this.

Two independent gates, animated separately:

  if (runtime.confirm_anim != 0):  // confirm dialog (panel_b) is visible
      panel_canvas = MenuPanel__Render(runtime.menu_panel_b)  // returns BitGrid
      world.display.draw_scaled_sprite(
          x = anim-eased screen position,
          y = anim-eased screen position,
          sprite = panel_canvas,  // DisplayBitGrid*
          src_x=0, src_y=0,
          src_w = runtime.confirm_panel_width,
          src_h = runtime.confirm_panel_height,
          flags = 0x100000)        // bit 20 = Copy/opaque blend
      if (runtime.esc_menu_state == 2):
          world.display.blit_sprite(
              x = panel_b.cursor_x,
              y = panel_b.cursor_y,
              sprite_id = 0x20,    // cursor-highlight sprite
              palette = 0xa000)

  if (runtime.esc_menu_anim != 0):  // main ESC menu (panel_a) is visible
      // Same as above but with menu_panel_a / panel_width / panel_height,
      // y anchored to top of screen, and cursor block runs when state == 1.

Animation values (esc_menu_anim, confirm_anim) are slewed each frame in
SetupFrameParams (0x534CA0) toward 0x10000 when state is open / 0 when
state is closed. The tail render is gated on the anim being non-zero, so
the menu fades smoothly in/out.

The panel canvas (BitGrid at runtime+0x2C / +0x34) is built once per
state-open via OpenEscMenu / OpenEscMenuConfirmDialog, then incrementally
redrawn each frame inside MenuPanel__Render to reflect cursor hover
state changes.
"""

  [function.signature]
  returns = "void"

  [[function.param]]
  name = "this"
  type = "GameRuntime *"
  storage = "EAX"

