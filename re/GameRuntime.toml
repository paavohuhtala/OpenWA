name = "GameRuntime__EscMenu_TickClosed"
plate_comment = "Per-frame tick of the ESC-menu state machine while the menu is closed (runtime.esc_menu_state == 0). Polls keyboard for just-pressed Escape (KeyboardAction::A23): if HUD is active, calls GameRuntime__OpenEscMenu (0x00535200) which builds the menu and transitions to state 1; otherwise plays KnownSoundId::WarningBeep at runtime.ui_volume. Ported to Rust as openwa_game::engine::main_loop::dispatch_frame::esc_menu_tick_closed; address kept for install_trap! only - no WA-side caller now that SetupFrameParams is Rust."

[[function]]
va = 0x00535200
name = "GameRuntime__OpenEscMenu"
plate_comment = """
Builds the in-game ESC menu in runtime._field_30: paints leaderboard ('First Team to %d Wins' header from gameinfo.scheme_first_to_n_wins at +0xD94F), bubble-sorts teams by composite (wins*10000 + sum_of_alive_HPs) DESCENDING, appends action buttons (Minimize Game, Force Sudden Death conditional on gameinfo+0xD941==0 && +0xD948==0, Draw This Round conditional on +0xD947==0, Quit) plus volume slider, and sets esc_menu_state=1.

Per-team data sources:
  GameInfo.team_scalar[team_idx_0based] @ gameinfo + 0x450 + team_idx * 0xBB8 (3000 bytes per team):
    +0x000 (=+0x450): speech_bank_idx (i8, -1 if none); also used as alliance/group key
    +0x001 (=+0x451): font_palette_idx (u8 color)
    +0x002 (=+0x452): scored flag (u8, 0 = include in leaderboard, !=0 = team eliminated/excluded)
    +0x003 (=+0x453): turn-order index (u8) - used by WorldRootEntity__Constructor's helper FUN_0055C920
    +0x005 (=+0x455): wins count (u8)
    +0x006 (=+0x456): team name (null-terminated C string, ~14 bytes max)
  WorldEntity.team_runtime[team_idx_1based] @ world + 0x4188 + team_idx * 0x51C (1308 bytes per team, slot 0 = sentinel):
    +0x000 (=+0x4180-base): worm slot array, stride 0x9C, with HP at slot+8 (i32). Two HP-like fields at slot+0 and slot+8 (slot+0 only used scheme>=0xE0).
    +0x498 (=+0x4618): elimination gate (i32, !=0 = team eliminated, skip from sums)
    +0x4A4 (=+0x4624): live worm count (i32)
Total team count: u8 at gameinfo+0x44C (matches int at world+0x64D8). Loop 0-based via gameinfo, 1-based via world.

__stdcall(this), RET 0x4. 628 instructions, cyclo 69, 30 calls. Bridged from Rust via bridge_open_esc_menu in dispatch_frame.rs.
"""

