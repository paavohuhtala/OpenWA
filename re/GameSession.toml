name = "GameSession__AdvanceFrame"
plate_comment = "GameSession__AdvanceFrame: Frame timing and engine tick. Uses GetTickCount or QueryPerformanceCounter depending on timer availability. Calls engine vtable slot 9 (offset 0x24) for the actual game simulation tick."

