[[function]]
va = 0x00540780
name = "MenuPanel__CenterCursorOnFirstKindZero"
plate_comment = "MenuPanel::CenterCursorOnFirstKindZero (0x00540780) — usercall(ESI=panel), no stack args, plain RET. Walks the panel.items array and, for any item whose kind == 0, sets panel.cursor_x/_y to the center of that item's clip rect and panel.cursor_active = 1. Used by OpenEscMenuConfirmDialog to default-park the cursor on the \"Yes\" button (kind=0) when the confirm dialog opens. Multiple items with kind==0 → last one wins (overwrites)."

