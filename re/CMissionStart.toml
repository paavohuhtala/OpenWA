[[function]]
va = 0x00499E90
name = "CMissionStart__OnCommandStart"
plate_comment = """
Mission Mode "Begin Mission" button handler (CMissionStart::OnCommand for ID 1000).

Loads the selected mission's .WAm file, runs the LobbyDialog (team picker for the mission), launches a CGameInfo "Mission" session, then -- on session end -- shows either CMissionFailed or CMissionSuccess / CMissionComplete depending on outcome.

When the mission was cleared, monotonically bumps G_MISSION_PROGRESS (= byte at G_TEAM_COLLECTION+0x08, abs 0x0088E4A8):
    if (current_mission + 1 > G_MISSION_PROGRESS)
        G_MISSION_PROGRESS = (uint8_t)(current_mission + 1);
Max value 0x21 (33 missions). The `current_mission + 1 >= 0x21` gate four lines later is what switches the closing dialog from per-mission Success to overall Complete.

This byte is persisted by CTeam__SaveTeams as the 4th byte of WG.WGT's header (the byte commonly mistaken for a NUL magic terminator). A fully-cleared campaign roster's header therefore reads "WGT!" because 0x21 == ASCII '!'.
"""

