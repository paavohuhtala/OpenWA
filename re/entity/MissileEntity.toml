[[function]]
va = 0x00508C90
name = "MissileEntity__OnContact"
plate_comment = """
CTaskMissile::OnContact — vtable slot 8.

Called when this missile contacts another entity (terrain, worm, object).
Dispatches by render_data[0x17] (missile_type: 2=Standard 3=Homing 4=Sheep 5=Cluster).

__thiscall(this, other: *CTask, self_side_flags: u32). RET 0x8.

Per-type behaviour:
- Sheep (4): if other's side-bit matches contact-face mask (render_data[0]) or lock flag
  (+0x3b0) set -> call slot-14 terminator + stash speed at +0x39C/+0x3A0. Else, on first
  contact (counter+0x3ac == 0), stash pos/speed at +0x3B8..+0x3C8 and arm countdown = 10.
- Homing (3): call CTaskMissile__HomingTargetCheck_Maybe(0x5018F0); if returns 0 zero
  speed and return.
- Standard (2) / Cluster (5): if ricochet-side mask (render_data[0x1C]) matches self_side,
  check ricochet counter (+0x35C). If <= 0 -> slot-14 terminator. Else roll
  AdvanceGameRNG % 100 < ricochet_chance (render_data[0x1D]); on hit, mirror speed
  (X = -X + |Y| or -X - |Y|).

Generic tail (all types reach via JNZ flow):
- Impact sound: PlayImpactSound_Maybe(render_data[0x1B], half_speed_mag * 0.4).
- Super call: CGameTask::vt8 (0x4FFED0) — base OnContact impl (damage to other, etc).
- Explosion (Standard/Cluster only): if render_data[0x20] != 0 and mask matches,
  possibly ImpactSpecialFx_Maybe (when render_data[6] == 0x40), then
  CreateExplosion(render_data[0x1F], FUN_00547CB0(this, rd[0x21], 0, spawn[0]), 0, ...).
- Homing only: roll RNG; if low 4 bits zero and self_side in {2,4}, set
  direction (+0x3C8) = sign-of(speed_x).
"""

