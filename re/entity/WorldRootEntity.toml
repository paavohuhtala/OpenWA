plate_comment = "Per-team HP delta detector: sums two HP fields across all worms in team (slot+0 and slot+8 at world.worm_record[team_idx_1based]) and broadcasts message 0x2B with team_idx if delta detected. Worm-record stride = 0x51C, worm-slot stride = 0x9C. Gate at +0x4618 (i32, !=0 = skip), worm count at +0x4624. Called from FUN_0055D020 / FUN_0055D080 with team_idx 1-based."

