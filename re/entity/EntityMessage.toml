# Inter-entity message-type discriminator. The 4-byte `msg_type` parameter
# threaded through every `HandleMessage(this, sender, msg_type, size, data)`
# call. Mirrored in Rust as `openwa_game::game::message::EntityMessage` —
# keep the two in sync. Numbering has gaps (10, 24-25, 65-66, 82, 87, 95)
# inherited from WA's original layout; the wkJellyWorm source headers were
# the starting point for the variant names.

[[enum]]
name = "EntityMessage"
namespace = "/OpenWA"
size = 4

  [enum.variant]
  None = 0x0
  FrameStart = 0x1
  FrameFinish = 0x2
  RenderScene = 0x3
  ProcessInput = 0x4
  UpdateNonCritical = 0x5
  MachineFinished = 0x6
