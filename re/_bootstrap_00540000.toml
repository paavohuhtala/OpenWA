[[function]]
va = 0x00547C30
name = "SpawnEffect"
plate_comment = """
Spawns a CreateAnimation event (msg 0x56) on the WorldRoot for the calling task.

Convention: __usercall(EAX=anim_kind, ECX=x) + stdcall(arg1..arg7), RET 0x1C, with ESI = task pointer at entry. SharedData__Lookup(ESI) returns the parent WorldRoot; if non-null, calls vtable[2] = HandleMessage(parent, ESI, 0x56, 0x408, &payload).

The 0x408-byte payload is the function's stack scratch. Only 11 dwords are meaningfully written:
  +0x00 = EAX (anim_kind, e.g. 0x80000)
  +0x04 = ECX (x)
  +0x08 = arg1 (y)
  +0x0C = arg2
  +0x10 = arg3
  +0x18 = 0 (overwrites arg4)
  +0x20 = arg5
  +0x24 = 0 (overwrites arg6)
  +0x28 = arg7
The rest of the 0x408 buffer is uninit. arg4 and arg6 are dead — written then immediately zeroed (compiler artifact).

Ported in Rust as a typed CreateAnimationMessage broadcast in `engine::main_loop::weapon_fire::fire_teleport`. See `crates/openwa-game/src/game/message.rs::CreateAnimationMessage`.
"""

