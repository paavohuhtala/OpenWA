[[function]]
va = 0x00572500
name = "Keyboard__AcquireInput"
plate_comment = """
Keyboard::AcquireInput(esi_flag, param_1)

  __usercall(ESI=esi_flag[bool], [ESP+4]=param_1[u32]) -> void, RET 0x4.
  Operates on the global g_GameSession (does NOT take `this` despite living
  on the Keyboard class — name is historical).

  Called from OnSYSCOMMAND on focus restore (twice — once for ACTIVATE-related
  path, once for SETFOCUS-style path). Re-acquires input ownership after the
  game window regains foreground:
    1. early-return if GameSession.flag_5c == 0 (not waiting for re-acquire)
    2. if esi_flag != 0: GetCursorPos → GameSession.cursor_initial (+0x70)
    3. GameSession.flag_2c = esi_flag
    4. FrontendDialog::UpdateCursor(g_InGameFrontendDialog 0x7C0534) — cursor visibility/position
    5. if esi_flag != 0: Cursor__ClipAndRecenter_Maybe (FUN_00573180)
    6. GameSession.flag_60 = 1; GameSession._unknown_06c = esi_flag
    7. if param_1 == 0: g_RenderContext->vtable[10] (renderer_restore_dims)
    8. Keyboard::PollState(GameSession.keyboard) — flush WM_KEY messages + snapshot
    9. if GameSession.display != 0:
         Display__RestoreSurfaces_Maybe(display)
         if returned nonzero:
           if esi_flag != 0: SetFocus(g_FrontendHwnd)
           GameSession.flag_5c = 0  // mark re-acquire done
"""

