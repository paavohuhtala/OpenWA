[[function]]
va = 0x00572320
name = "Keyboard__AlertUser"
plate_comment = """
Keyboard::AlertUser(flash, beep_kind)

  __thiscall(this=ECX, flash=stack[char], beep_kind=stack[int]) -> void, RET 0x8.

  Notifies the user when the WA window is not foreground:
    1. Skip if foreground == GameSession.hwnd or g_FrontendHwnd
    2. Beep: beep_kind 1 -> MessageBeep(MB_ICONINFORMATION 0x40)
             beep_kind 2 -> MessageBeep(MB_ICONWARNING     0x30)
             other       -> no beep
    3. Flash window if `flash != 0`:
         If g_FlashWindowExFn != NULL:
           FlashWindowEx(FLASHWINFO { dwFlags=FLASHW_TRAY|FLASHW_TIMERNOFG (0x0E), uCount=15 })
         Else (Win9x fallback):
           FlashWindow(g_FrontendHwnd, TRUE)
           g_WindowFlashing = 1
"""

