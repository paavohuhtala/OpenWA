[[function]]
va = 0x00547E70
name = "GameWorld__RegisterEventPoint"
plate_comment = """
Reset effect-event point at world+0x73A0..+0x73AC to (ECX, EDX) and arm the gate at +0x739C.

The disassembly shape suggests a "reset bbox / expand bbox" pattern, but the entry path unconditionally zeros the gate at 0x547E78 BEFORE checking it at 0x547E8A, so the JNZ at 0x547E8E is never taken — the "expand" branch (0x547EA5..) is dead code. Effective behavior: always reset to single point + arm gate.

Calling convention: __usercall(ECX=x, EDX=y) + stdcall(task), RET 0x4. The task argument is read at +0x2C to get the GameWorld pointer.

Ported in Rust as openwa-game::engine::world::GameWorld::register_event_point_raw. Was bridged earlier as bridge_set_gravity_center / call_set_gravity_center; the "gravity center" interpretation was incorrect.
"""

