[[function]]
va = 0x0056A010
name = "DisplayGfx__DestructorImpl"
plate_comment = """
DisplayGfx::DestructorImpl — fastcall on ECX = DisplayGfx*. The actual cleanup body, called from the vtable[0] thunk at 0x569CE0. Wrapped in C++ SEH (sets ExceptionList).

Cleanup steps (in order):
  1. Rebind vtable to &DDDisplay_vtable (the DisplayBase parent vtable).
  2. If display_initialized (+0x3540) is non-zero:
     a. DisplayGfx::FreeLayerSpriteTable (0x56A280) — iterate sprite_table[1..0x3FF] at +0x3DD4 and free each LayerSprite + its frame_array.
     b. If tile_bitmap_sets[1] (+0x4DD8) is non-null: TileBitmapSet::Destructor (0x569BC0) on it, then _free the TileBitmapSet itself.
     c. Iterate the CBitmap* vector at +0x3580..+0x358C (bitmap_ptr/end/cap) and for each non-null entry call vtable[6](release) then vtable[0](1) (destructor + free).
     d. Call vtable[3](1) on layer_2 (+0x3DA4), layer_1 (+0x3DA0), layer_0 (+0x3D9C) — three render-context BitGrids.
     e. Iterate the FramePostProcessHook* std::vector at +0x24DF8 (start@+4, end@+8, cap@+0xC) and call vtable[0](1) on each entry.
     f. Call g_DDDisplayWrapper->vtable[7](1) — backend release.
  3. Free the FramePostProcessHook std::vector data buffer (+0x24DFC) and clear the three vec pointers.
  4. Rebind the embedded BitGrid at +0x3DA8 to &BitGrid__vtable, then if its external_buffer flag (+0x3DAC) is 0, free the data buffer (+0x3DB0).
  5. Free the CBitmap vector data buffer (+0x3580) and clear all three vec pointers.
  6. Call DisplayBase::Destructor (parent class).
  7. Restore ExceptionList.
"""

[[function]]
va = 0x0056A280
name = "DisplayGfx__FreeLayerSpriteTable"
plate_comment = """
DisplayGfx::FreeLayerSpriteTable — iterates DisplayGfx::sprite_table[1..1024] (the bitmap-sprite array at this+0x3DD4) and for each non-null LayerSprite*:
  1. If sprite->frame_array (+0x6c) is non-null, run a vector destructor over the LayerSpriteFrame array (count is stored at frame_array[-4]) calling LayerSpriteFrame::Destructor on each entry, then free the count-prefixed allocation.
  2. Free the LayerSprite object itself.
  3. Clear the slot to null.

Iterates indices 1..0x400 (skips index 0). Called only from DisplayGfx::DestructorImpl (0x56A010).
"""

