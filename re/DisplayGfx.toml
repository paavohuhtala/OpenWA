[[function]]
va = 0x0056CDB0
name = "DisplayGfx__DispatchFramePostProcessHooks"
plate_comment = """
DisplayGfx::DispatchFramePostProcessHooks — usercall on DisplayGfx*. Iterates the std::vector at this+0x24DF8 of FramePostProcessHook* (one per registered hook), in two phases:

  Phase 1 (poll): for each entry, call vtable[1]() (= GetCaptureRequest); track the max non-zero return value.

  Phase 2 (dispatch): if any entry returned non-zero, call DisplayGfx::AcquireRenderLock, then re-iterate and for each entry whose vtable[1]() is non-zero, call vtable[2](this->layer_0). Slot 2 receives the rendered frame as a DisplayBitGrid* and is expected to read pixels out of it.

Called once per frame from RenderFrame_Maybe (0x56E06C). The shipping game registers exactly one entry — the PNG screenshot writer with vtable 0x66A2C4.
"""

