# MinHook entries for the Mouse subsystem. One file per subsystem mirrors
# `re/**/*.toml` and `crates/openwa-dll/src/replacements/*.rs`.

[[hook]]
wa_function = "Mouse__PollAndAcquire"
rust_impl = "openwa_game::input::mouse::mouse_poll_and_acquire"

[[hook]]
wa_function = "Mouse__ReleaseAndCenter"
rust_impl = "openwa_game::input::mouse::mouse_release_and_center"

[[hook]]
wa_function = "Cursor__ClipAndRecenter"
rust_impl = "openwa_game::input::mouse::cursor_clip_and_recenter"
