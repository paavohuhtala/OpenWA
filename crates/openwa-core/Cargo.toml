[package]
name = "openwa-core"
version = "0.1.0"
edition = "2021"
description = "Core library for Worms Armageddon reverse engineering — types, addresses, and runtime utilities"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_System_Memory",
    "Win32_System_Registry",
    "Win32_UI_WindowsAndMessaging",
] }
