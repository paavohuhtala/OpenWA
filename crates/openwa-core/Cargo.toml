[package]
name = "openwa-core"
version = "0.1.0"
edition = "2021"
description = "Core library for Worms Armageddon reverse engineering — types, addresses, and runtime utilities"

[dependencies]
heapless = "0.9"
hound = "3"
inventory = "0.3.22"
openwa-debug-proto = { path = "../openwa-debug-proto" }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.62", features = [
    "Win32_Media_Audio_DirectSound",
] }
windows-sys = { version = "0.59", features = [
    "Win32_System_Memory",
    "Win32_System_Registry",
    "Win32_UI_WindowsAndMessaging",
] }
