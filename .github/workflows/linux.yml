name: Linux Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  XWIN_ARCH: x86

jobs:
  build:
    name: Build & Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
          components: clippy

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Run clippy
        run: cargo xwin clippy --target i686-pc-windows-msvc --workspace -- -D warnings

      - name: Build all crates
        run: cargo xwin build --target i686-pc-windows-msvc --workspace --release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwa-release
          path: |
            target/i686-pc-windows-msvc/release/*.dll
            target/i686-pc-windows-msvc/release/*.exe
          if-no-files-found: ignore
